#
# This is a basic AxBoot configuration file.
#

##
# Automatically boots the selected kernel after
# the specified amount of seconds passed.
# Maximum allowed time is 120 seconds.
#
# Available special values:
# 0  | Automatically boot first selection
# -1 | Wait for user to manually select a kernel to boot
#
timeout=3

##
# Specifies a path to the kernel to boot
#
kernel=/System/axkrnl

##
# Specifies commandline arguments to pass to the kernel
#
cmdline=-v debug=COM1
